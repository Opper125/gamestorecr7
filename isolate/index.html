<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Digital marketplace for games, gift cards, and merchandise" />
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="/js/global/config.js" defer></script>
  <script src="/js/global/utils.js" defer></script>
  <script src="/js/global/loading.js" defer></script>
  <script src="/js/global/logger-block.js" defer></script>
  <script src="/js/global/auth.js" defer></script>
  <script src="/js/global/realtime.js" defer></script>
  <script src="/js/components/banner-slider.js" defer></script>
  <script src="/js/components/live-text-bar.js" defer></script>
  <script src="/js/components/live-order-bar.js" defer></script>
  <script src="/js/components/cart.js" defer></script>
  <script src="/js/components/slip-generator.js" defer></script>
  <script src="/js/components/review.js" defer></script>
  <script src="/js/components/promo-apply.js" defer></script>
  <script src="/js/components/notification.js" defer></script>
  <script src="/js/pages/users/intro.js" defer></script>
  <script src="/js/pages/users/auth.js" defer></script>
  <script src="/js/pages/users/home.js" defer></script>
  <script src="/js/pages/users/categories.js" defer></script>
  <script src="/js/pages/users/gstore.js" defer></script>
  <script src="/js/pages/users/news.js" defer></script>
  <script src="/js/pages/users/orders.js" defer></script>
  <script src="/js/pages/users/profile.js" defer></script>
  <script type="module" crossorigin src="/assets/index-DERTXjxX.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-WbRlNTH4.css">
</head>
<body>
  <!-- Loading Overlay (Admin-defined GIF/Webm) -->
  <div id="loading-overlay" class="loading-overlay" aria-hidden="true">
    <div class="loading-content">
      <img id="loading-gif" src="" alt="Loading" class="loading-gif" />
    </div>
  </div>

  <!-- Site Off Overlay -->
  <div id="site-off-overlay" class="site-off-overlay" style="display:none;" aria-hidden="true">
    <div class="site-off-content">
      <img id="site-off-media" src="" alt="" class="site-off-media" />
      <p id="site-off-reason" class="site-off-reason"></p>
      <div id="site-off-contact" class="site-off-contact"></div>
    </div>
  </div>

  <!-- Intro Screen (6s then transitions to Dashboard) -->
  <div id="intro-screen" class="intro-screen" role="presentation">
    <div class="intro-logo-container">
      <img id="intro-logo" src="" alt="Logo" class="intro-logo" />
    </div>
  </div>

  <!-- Announcement Image Overlay (shown after intro on first render) -->
  <div id="announcement-overlay" class="announcement-overlay" style="display:none;" aria-label="Announcement">
    <div class="announcement-wrapper">
      <img id="announcement-img" src="" alt="Announcement" class="announcement-img" />
      <button id="announcement-close" class="announcement-close" aria-label="Close announcement">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- Main Dashboard Shell -->
  <div id="app" class="app-container" style="display:none;">

    <!-- Top Bar -->
    <header id="topbar" class="topbar" role="banner">
      <div class="topbar-left">
        <img id="topbar-logo" src="" alt="Logo" class="topbar-logo" />
      </div>
      <div class="topbar-right">
        <!-- Auth buttons (shown before login) -->
        <div id="auth-buttons" class="auth-buttons">
          <button id="btn-signup" class="auth-btn">Sign Up</button>
          <span class="auth-divider">|</span>
          <button id="btn-login" class="auth-btn">Log In</button>
        </div>
        <!-- Action icons (shown after login) -->
        <div id="action-icons" class="action-icons" style="display:none;">
          <button id="btn-search" class="icon-btn" aria-label="Search">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button id="btn-cart" class="icon-btn cart-btn" aria-label="Cart">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span id="cart-badge" class="cart-badge" style="display:none;">0</span>
          </button>
          <button id="btn-notifications" class="icon-btn notif-btn" aria-label="Notifications">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="notif-badge" class="notif-badge" style="display:none;">0</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Notification Panel -->
    <div id="notification-panel" class="notification-panel" style="display:none;" role="dialog" aria-label="Notifications">
      <div class="notif-header">
        <h3>Notifications</h3>
        <button id="notif-close" class="notif-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="notif-list" class="notif-list"></div>
    </div>

    <!-- Search Page (full-screen overlay) -->
    <div id="search-page" class="search-page overlay-page" style="display:none;" role="dialog" aria-label="Search">
      <div class="search-header">
        <button id="search-back" class="back-btn" aria-label="Back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <input id="search-input" type="text" class="search-input" placeholder="Search categories, products, menus..." autocomplete="off" />
        <button id="search-clear" class="search-clear" aria-label="Clear">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>

    <!-- Cart Page (full-screen overlay) -->
    <div id="cart-page" class="cart-page overlay-page" style="display:none;" role="dialog" aria-label="Shopping Cart">
      <div class="cart-header">
        <button id="cart-back" class="back-btn" aria-label="Back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <h3>Cart</h3>
        <span id="cart-count-label" class="cart-count-label"></span>
      </div>
      <div id="cart-items" class="cart-items"></div>
      <div id="cart-summary" class="cart-summary" style="display:none;">
        <div class="cart-total-row">
          <span>Total Items</span>
          <span id="cart-total-items">0</span>
        </div>
        <div class="cart-total-row">
          <span>Grand Total</span>
          <span id="cart-grand-total">0 MMK</span>
        </div>
        <button id="btn-checkout" class="btn-primary btn-checkout">Checkout</button>
      </div>
      <div id="cart-empty" class="cart-empty" style="display:none;">
        <p>Your cart is empty</p>
      </div>
    </div>

    <!-- Checkout Page (full-screen overlay) -->
    <div id="checkout-page" class="checkout-page overlay-page" style="display:none;" role="dialog" aria-label="Checkout">
      <div class="checkout-header">
        <button id="checkout-back" class="back-btn" aria-label="Back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <h3>Checkout</h3>
      </div>
      <div id="checkout-content" class="checkout-content"></div>
    </div>

    <!-- Main Page Content -->
    <main id="page-content" class="page-content">

      <!-- Home Page -->
      <section id="page-home" class="page active">
        <div id="home-banner-slider" class="banner-slider"></div>
        <div id="home-live-text" class="live-text-bar"></div>
        <div id="home-live-orders" class="live-order-bar"></div>
        <div id="home-menu-strip" class="menu-strip"></div>
        <div id="home-categories" class="home-categories"></div>
        <div id="home-standalone-products" class="home-standalone-products"></div>
      </section>

      <!-- Categories Page -->
      <section id="page-categories" class="page">
        <div id="categories-header" class="page-header">
          <h2>Categories</h2>
        </div>
        <div id="categories-grid" class="categories-grid"></div>
      </section>

      <!-- G Store Page -->
      <section id="page-gstore" class="page">
        <div class="gstore-header">
          <div class="gstore-tabs">
            <button class="gstore-tab active" data-tab="topup">Game Topup</button>
            <button class="gstore-tab" data-tab="giftcards">Gift Cards</button>
          </div>
        </div>
        <div id="gstore-content" class="gstore-content"></div>
      </section>

      <!-- News Page -->
      <section id="page-news" class="page">
        <div class="news-header">
          <div class="news-tabs">
            <button class="news-tab active" data-tab="videos">Videos</button>
            <button class="news-tab" data-tab="shorts">Shorts</button>
            <button class="news-tab" data-tab="posts">Posts</button>
          </div>
        </div>
        <div id="news-content" class="news-content"></div>
      </section>

      <!-- Orders Page -->
      <section id="page-orders" class="page">
        <div class="orders-header">
          <div class="orders-tabs">
            <button class="orders-tab active" data-tab="pending">Pending</button>
            <button class="orders-tab" data-tab="approved">Approved</button>
            <button class="orders-tab" data-tab="rejected">Rejected</button>
          </div>
        </div>
        <div id="orders-content" class="orders-content"></div>
      </section>

      <!-- Profile Page -->
      <section id="page-profile" class="page">
        <div id="profile-content" class="profile-content"></div>
      </section>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav id="bottomnav" class="bottomnav" role="navigation" aria-label="Main navigation">
      <button class="nav-item active" data-page="home" aria-label="Home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-page="categories" aria-label="Categories">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span class="nav-label">Categories</span>
      </button>
      <button class="nav-item" data-page="gstore" aria-label="G Store">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2h12l4 8-2 12H4L2 10z"/><path d="M12 10v8"/><path d="M8 14h8"/></svg>
        <span class="nav-label">G Store</span>
      </button>
      <button class="nav-item" data-page="news" aria-label="News">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-4 0V6"/><path d="M10 6h8"/><path d="M10 10h8"/><path d="M10 14h6"/></svg>
        <span class="nav-label">News</span>
      </button>
      <button class="nav-item" data-page="orders" aria-label="Orders">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
        <span class="nav-label">Orders</span>
      </button>
      <button class="nav-item" data-page="profile" aria-label="Profile">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="nav-label">Profile</span>
      </button>
    </nav>

  </div>

  <!-- Auth Modals -->
  <div id="auth-modals" style="display:none;">
    <!-- Sign Up Modal -->
    <div id="signup-modal" class="modal-overlay" role="dialog" aria-label="Sign Up">
      <div class="modal-container">
        <button class="modal-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <h2 class="modal-title">Sign Up</h2>
        <form id="signup-form" class="auth-form" autocomplete="off">
          <div class="form-group">
            <label for="signup-username">Username</label>
            <input id="signup-username" type="text" class="form-input" placeholder="Min 6 characters, English only" required minlength="6" />
            <span class="form-error" id="signup-username-error"></span>
          </div>
          <div class="form-group">
            <label for="signup-gmail">Gmail</label>
            <input id="signup-gmail" type="email" class="form-input" placeholder="your@gmail.com" required />
            <span class="form-error" id="signup-gmail-error"></span>
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input id="signup-password" type="password" class="form-input" placeholder="8–16 chars, 1 uppercase, 3 digits, 1 special" required minlength="8" maxlength="16" />
            <span class="form-error" id="signup-password-error"></span>
          </div>
          <div class="form-group">
            <label for="signup-pin">PIN (6 digits)</label>
            <input id="signup-pin" type="password" class="form-input" placeholder="123456" required minlength="6" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" />
            <span class="form-error" id="signup-pin-error"></span>
          </div>
          <button type="submit" class="btn-primary btn-full">Create Account</button>
        </form>
        <p class="auth-switch">Already have an account? <button class="link-btn" id="switch-to-login">Log In</button></p>
      </div>
    </div>

    <!-- Log In Modal -->
    <div id="login-modal" class="modal-overlay" role="dialog" aria-label="Log In">
      <div class="modal-container">
        <button class="modal-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <h2 class="modal-title">Log In</h2>
        <form id="login-form" class="auth-form" autocomplete="off">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input id="login-username" type="text" class="form-input" placeholder="Your username" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" class="form-input" placeholder="Your password" required />
          </div>
          <button type="submit" class="btn-primary btn-full">Log In</button>
        </form>
        <p class="auth-switch">Don't have an account? <button class="link-btn" id="switch-to-signup">Sign Up</button></p>
      </div>
    </div>
  </div>

  <!-- Confirm Password Modal (for approve actions) -->
  <div id="confirm-pwd-modal" class="modal-overlay" style="display:none;" role="dialog" aria-label="Confirm Password">
    <div class="modal-container modal-sm">
      <button class="modal-close" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h3 class="modal-title">Enter Admin Password</h3>
      <div class="form-group">
        <input id="confirm-pwd-input" type="password" class="form-input" placeholder="Admin approve password" />
      </div>
      <div class="modal-actions">
        <button id="confirm-pwd-cancel" class="btn-secondary">Cancel</button>
        <button id="confirm-pwd-submit" class="btn-primary">Confirm</button>
      </div>
    </div>
  </div>

</body>
</html>
