<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Admin Dashboard" />
  <title>Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/components/topbar.css" />
  <link rel="stylesheet" href="/css/components/cards.css" />
  <link rel="stylesheet" href="/css/components/modals.css" />
  <link rel="stylesheet" href="/css/components/forms.css" />
  <link rel="stylesheet" href="/css/components/banners.css" />
  <link rel="stylesheet" href="/css/components/loaders.css" />
  <link rel="stylesheet" href="/css/components/bars.css" />
  <link rel="stylesheet" href="/css/pages/admin/dashboard.css" />
  <link rel="stylesheet" href="/css/pages/admin/settings.css" />
  <link rel="stylesheet" href="/css/pages/admin/users.css" />
  <link rel="stylesheet" href="/css/pages/admin/orders.css" />
  <link rel="stylesheet" href="/css/pages/admin/products.css" />
  <link rel="stylesheet" href="/css/pages/admin/banner.css" />
  <link rel="stylesheet" href="/css/pages/admin/payment.css" />
  <link rel="stylesheet" href="/css/pages/admin/promo.css" />
  <link rel="stylesheet" href="/css/pages/admin/g2bulk.css" />
  <link rel="stylesheet" href="/css/pages/admin/reseller.css" />
  <script src="/js/global/config.js" defer></script>
  <script src="/js/global/utils.js" defer></script>
  <script src="/js/global/loading.js" defer></script>
  <script src="/js/global/logger-block.js" defer></script>
  <script src="/js/global/realtime.js" defer></script>
  <script src="/js/pages/admin/login.js" defer></script>
  <script src="/js/pages/admin/dashboard.js" defer></script>
  <script src="/js/pages/admin/settings.js" defer></script>
  <script src="/js/pages/admin/users.js" defer></script>
  <script src="/js/pages/admin/orders.js" defer></script>
  <script src="/js/pages/admin/products.js" defer></script>
  <script src="/js/pages/admin/banner.js" defer></script>
  <script src="/js/pages/admin/payment.js" defer></script>
  <script src="/js/pages/admin/promo.js" defer></script>
  <script src="/js/pages/admin/g2bulk.js" defer></script>
  <script src="/js/pages/admin/reseller.js" defer></script>
  <script src="/js/global/navigation.js" defer></script>
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay" aria-hidden="true">
    <div class="loading-content">
      <img id="loading-gif" src="" alt="Loading" class="loading-gif" />
    </div>
  </div>

  <!-- IP Setup Overlay (shown when ADMIN_IPADDRESS is not set) -->
  <div id="ip-setup-overlay" class="ip-setup-overlay" style="display:none;">
    <div class="ip-setup-content">
      <p>Set this IP address in <code>ADMIN_IPADDRESS</code> in Vercel ENV to enable access.</p>
      <div id="client-ip-display" class="client-ip-display"></div>
    </div>
  </div>

  <!-- Login Screen -->
  <div id="admin-login-screen" class="admin-login-screen">
    <div class="login-container">
      <h1 class="login-title">Admin</h1>
      <form id="admin-login-form" class="auth-form" autocomplete="off">
        <div class="form-group">
          <label for="admin-login-password">Password</label>
          <input id="admin-login-password" type="password" class="form-input" placeholder="Enter admin password" required />
        </div>
        <button type="submit" class="btn-primary btn-full">Unlock</button>
      </form>
      <p id="admin-login-error" class="form-error" style="display:none;"></p>
    </div>
  </div>

  <!-- Admin Dashboard Shell -->
  <div id="admin-app" class="app-container" style="display:none;">

    <!-- Admin Top Bar -->
    <header id="admin-topbar" class="topbar admin-topbar" role="banner">
      <div class="topbar-left">
        <button id="admin-sidebar-toggle" class="icon-btn" aria-label="Toggle sidebar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h2 class="topbar-title">Admin Dashboard</h2>
      </div>
      <div class="topbar-right">
        <button id="admin-logout" class="auth-btn">Logout</button>
      </div>
    </header>

    <!-- Sidebar Navigation -->
    <aside id="admin-sidebar" class="admin-sidebar" role="navigation" aria-label="Admin navigation">
      <div class="sidebar-logo">
        <img id="admin-sidebar-logo" src="" alt="Logo" class="sidebar-logo-img" />
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-item active" data-page="dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="sidebar-item" data-page="settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>Settings</span>
        </button>
        <button class="sidebar-item" data-page="users">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Users</span>
        </button>
        <button class="sidebar-item" data-page="orders">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
          <span>Orders</span>
        </button>
        <button class="sidebar-item" data-page="products">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <span>Menu</span>
        </button>
        <button class="sidebar-item" data-page="categories">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span>Categories</span>
        </button>
        <button class="sidebar-item" data-page="banner">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Banner</span>
        </button>
        <button class="sidebar-item" data-page="payment">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          <span>Payment</span>
        </button>
        <button class="sidebar-item" data-page="promo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          <span>Promo</span>
        </button>
        <button class="sidebar-item" data-page="g2bulk">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2h12l4 8-2 12H4L2 10z"/><path d="M12 10v8"/><path d="M8 14h8"/></svg>
          <span>G2Bulk</span>
        </button>
        <button class="sidebar-item" data-page="reseller">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>Reseller</span>
        </button>
      </nav>
    </aside>

    <!-- Admin Main Content -->
    <main id="admin-content" class="admin-content">

      <section id="admin-page-dashboard" class="admin-page active">
        <h2 class="page-title">Dashboard</h2>
        <div id="admin-dashboard-stats" class="stats-grid"></div>
        <div id="admin-dashboard-chart" class="chart-container"></div>
      </section>

      <section id="admin-page-settings" class="admin-page">
        <h2 class="page-title">Settings</h2>
        <div id="admin-settings-form" class="settings-form"></div>
      </section>

      <section id="admin-page-users" class="admin-page">
        <h2 class="page-title">Users</h2>
        <div id="admin-users-search" class="search-bar">
          <input type="text" id="admin-users-search-input" placeholder="Search users..." class="form-input" />
        </div>
        <div id="admin-users-list" class="users-list"></div>
      </section>

      <section id="admin-page-orders" class="admin-page">
        <h2 class="page-title">Orders</h2>
        <div class="orders-tabs">
          <button class="orders-tab active" data-tab="all">All</button>
          <button class="orders-tab" data-tab="pending">Pending</button>
          <button class="orders-tab" data-tab="approved">Approved</button>
          <button class="orders-tab" data-tab="rejected">Rejected</button>
        </div>
        <div id="admin-orders-list" class="orders-list"></div>
      </section>

      <section id="admin-page-products" class="admin-page">
        <h2 class="page-title">Menu Management</h2>
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="menus">Menus</button>
          <button class="admin-tab" data-tab="menu-categories">Categories</button>
          <button class="admin-tab" data-tab="menu-products-p1">Products P1</button>
          <button class="admin-tab" data-tab="menu-products-p2">Products P2</button>
          <button class="admin-tab" data-tab="menu-products-p3">Products P3</button>
        </div>
        <div id="admin-products-content" class="admin-tab-content"></div>
      </section>

      <section id="admin-page-categories" class="admin-page">
        <h2 class="page-title">Home Categories</h2>
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="category-titles">Titles</button>
          <button class="admin-tab" data-tab="home-categories">Categories</button>
          <button class="admin-tab" data-tab="home-products-p1">Products P1</button>
          <button class="admin-tab" data-tab="home-products-p2">Products P2</button>
        </div>
        <div id="admin-categories-content" class="admin-tab-content"></div>
      </section>

      <section id="admin-page-banner" class="admin-page">
        <h2 class="page-title">Banners</h2>
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="banner-home">Home Banners</button>
          <button class="admin-tab" data-tab="banner-category">Category Banners</button>
        </div>
        <div id="admin-banner-content" class="admin-tab-content"></div>
      </section>

      <section id="admin-page-payment" class="admin-page">
        <h2 class="page-title">Payment Methods</h2>
        <div id="admin-payment-list" class="payment-list"></div>
        <button id="btn-add-payment" class="btn-primary">Add Payment Method</button>
      </section>

      <section id="admin-page-promo" class="admin-page">
        <h2 class="page-title">Promo Codes</h2>
        <button id="btn-add-promo" class="btn-primary">Create Promo Code</button>
        <div id="admin-promo-list" class="promo-list"></div>
      </section>

      <section id="admin-page-g2bulk" class="admin-page">
        <h2 class="page-title">G2Bulk</h2>
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="g2bulk-categories">Categories</button>
          <button class="admin-tab" data-tab="g2bulk-games">Game Assign</button>
          <button class="admin-tab" data-tab="g2bulk-icons">Product Icons</button>
          <button class="admin-tab" data-tab="g2bulk-prices">Price Settings</button>
          <button class="admin-tab" data-tab="g2bulk-deposits">Deposits</button>
          <button class="admin-tab" data-tab="g2bulk-buying-pro">Buying Pro</button>
        </div>
        <div id="admin-g2bulk-content" class="admin-tab-content"></div>
      </section>

      <section id="admin-page-reseller" class="admin-page">
        <h2 class="page-title">Reseller Management</h2>
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="reseller-kyc">KYC Applications</button>
          <button class="admin-tab" data-tab="reseller-plans">Premium Plans</button>
        </div>
        <div id="admin-reseller-content" class="admin-tab-content"></div>
      </section>

    </main>

    <!-- Input Tables Modal (admin) -->
    <div id="admin-input-tables-modal" class="modal-overlay" style="display:none;" role="dialog">
      <div class="modal-container">
        <button class="modal-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <h3 class="modal-title">Manage Input Tables</h3>
        <div id="admin-input-tables-content"></div>
      </div>
    </div>

  </div>

  <!-- Confirm Password Modal -->
  <div id="confirm-pwd-modal" class="modal-overlay" style="display:none;" role="dialog" aria-label="Confirm Password">
    <div class="modal-container modal-sm">
      <button class="modal-close" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h3 class="modal-title">Enter Approve Password</h3>
      <div class="form-group">
        <input id="confirm-pwd-input" type="password" class="form-input" placeholder="Admin approve password" />
      </div>
      <p id="confirm-pwd-error" class="form-error" style="display:none;"></p>
      <div class="modal-actions">
        <button id="confirm-pwd-cancel" class="btn-secondary">Cancel</button>
        <button id="confirm-pwd-submit" class="btn-primary">Confirm</button>
      </div>
    </div>
  </div>

</body>
</html>
